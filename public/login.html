<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenCollect 登录</title>
    <style>
      :root {
        color-scheme: light;
        --red: #ff2442;
        --ink: #1f2229;
        --muted: #8a8f99;
        --border: #dfe2e7;
        --surface: #f6f7f9;
      }

      * {
        box-sizing: border-box;
        margin: 0;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--surface);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: 24px;
      }

      .login {
        width: min(380px, 100%);
        display: grid;
        gap: 18px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 24px;
        font-weight: 900;
      }

      .brand-mark {
        width: 48px;
        height: 48px;
        border-radius: 10px;
        background: var(--red);
        color: #fff;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        font-weight: 900;
      }

      form {
        display: grid;
        gap: 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fff;
        padding: 18px;
        box-shadow: 0 16px 40px rgba(20, 24, 32, 0.08);
      }

      label {
        display: grid;
        gap: 8px;
        color: #656b76;
        font-size: 13px;
        font-weight: 800;
      }

      input {
        width: 100%;
        min-height: 44px;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0 12px;
        color: var(--ink);
        font-size: 16px;
        font-weight: 700;
        outline: none;
      }

      input:focus {
        border-color: rgba(255, 36, 66, 0.4);
        box-shadow: 0 0 0 3px rgba(255, 36, 66, 0.08);
      }

      button {
        min-height: 44px;
        border: 0;
        border-radius: 8px;
        background: var(--red);
        color: #fff;
        font-size: 15px;
        font-weight: 900;
        cursor: pointer;
      }

      button:disabled {
        cursor: default;
        opacity: 0.62;
      }

      .message {
        min-height: 20px;
        color: var(--red);
        font-size: 13px;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main class="login">
      <div class="brand">
        <span class="brand-mark">OC</span>
        <span>OpenCollect</span>
      </div>

      <form id="loginForm">
        <label for="password">
          访问口令
          <input id="password" name="password" type="password" autocomplete="current-password" autofocus required />
        </label>
        <button type="submit">登录</button>
        <p id="message" class="message" role="status"></p>
      </form>
    </main>

    <script>
      const form = document.querySelector("#loginForm");
      const password = document.querySelector("#password");
      const button = form.querySelector("button");
      const message = document.querySelector("#message");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        button.disabled = true;
        button.textContent = "登录中";
        message.textContent = "";

        try {
          const response = await fetch("/api/auth/login", {
            method: "POST",
            headers: {
              "content-type": "application/json"
            },
            body: JSON.stringify({ password: password.value })
          });
          const payload = await response.json();
          if (!response.ok) throw new Error(payload.message || "登录失败");
          const next = new URLSearchParams(window.location.search).get("next") || "/";
          window.location.assign(next.startsWith("/") ? next : "/");
        } catch (error) {
          message.textContent = error.message || "登录失败";
        } finally {
          button.disabled = false;
          button.textContent = "登录";
        }
      });
    </script>
  </body>
</html>
